name: Salesforce Code Analyzer

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches:
      - main
   paths:
  - 'force-app/**'
permissions:
  issues: write
  pull-requests: write

jobs:
  salesforce-code-analyzer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Install Code Analyzer Plugin
        run: sfdx plugins install @salesforce/sfdx-scanner@latest

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_JWT_SECRET_KEY }}" > server.key
          sf org login jwt \
            --client-id ${{ secrets.SALESFORCE_CONSUMER_KEY }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SALESFORCE_USERNAME }} \
            --instance-url ${{ secrets.SALESFORCE_INSTANCE_URL }} \
            --alias ciOrg

      - name: Run Code Analyzer
        id: run-code-analyzer
        uses: forcedotcom/run-code-analyzer@v1
        with:
          run-command: run
          run-arguments: --normalize-severity --target force-app/ --outfile results.html
          results-artifact-name: code-analyzer-results

      - name: Run Apex Tests
        run: |
          sf apex run test \
            --target-org ciOrg \
            --code-coverage \
            --result-format human \
            --wait 10

      - name: Comment Code Analyzer results on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const violations = '${{ steps.run-code-analyzer.outputs.num-violations }}';
            const sev1 = '${{ steps.run-code-analyzer.outputs.num-sev1-violations }}';
            const sev3 = '${{ steps.run-code-analyzer.outputs.num-sev3-violations }}';
            const body = `## Salesforce Code Analyzer 結果\n| 項目 | 件数 |\n|---|---|\n| 問題の総数 | ${violations} |\n| 重大度1（最も深刻） | ${sev1} |\n| 重大度3 | ${sev3} |\n\n詳細はActionsのArtifact（results.html）を確認してください。`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check results and fail if needed
        if: |
          steps.run-code-analyzer.outputs.exit-code > 0 ||
          steps.run-code-analyzer.outputs.num-sev1-violations > 0 ||
          steps.run-code-analyzer.outputs.num-violations > 10
        run: exit 1
